# Render Blueprint — one-click hosting for SDLC Agentic AI.
#
# How to use:
#   Render → New → Blueprint → pick the `sdlc-agentic-ai` repo → Apply.
# Render builds the Dockerfile IN ITS CLOUD (no local Docker needed) and serves
# the FastAPI API + the built React UI from a single HTTPS origin.
#
# Secrets are NEVER stored in this file. Keys marked `sync: false` show up as
# blank, fill-in-the-dashboard env vars — so tokens stay out of git. Leaving them
# blank is fine: every provider safely falls back to its free mock.

services:
  - type: web
    name: sdlc-agentic-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free                 # change to "starter" for always-on (no cold starts)
    region: oregon             # pick the region nearest you (oregon | frankfurt | singapore | ohio | virginia)
    healthCheckPath: /api/health
    autoDeploy: true           # redeploy automatically on every push to main
    envVars:
      # ── Provider selection ───────────────────────────────────────────────
      # Set to the LIVE provider (matches your .env). Each one SAFELY FALLS BACK
      # to its free mock until the matching secret below is filled in the Render
      # dashboard — so a missing key never crashes the app. Switch any of these
      # to "mock" for a $0 deploy.
      - key: LLM_PROVIDER
        value: azure           # mock | azure | openai
      - key: JIRA_PROVIDER
        value: cloud           # mock | cloud
      - key: GITHUB_PROVIDER
        value: cloud           # mock | cloud
      - key: KNOWLEDGE_PROVIDER
        value: foundry         # mock | foundry

      # ── Non-secret operational config (safe to commit) ───────────────────
      # These have CODE DEFAULTS that DIFFER from your setup, so they must be
      # pinned here or live calls misbehave (wrong API version / branch / type).
      - key: AZURE_OPENAI_API_VERSION
        value: "2024-08-01-preview"
      - key: FOUNDRY_API_VERSION
        value: "2025-05-01-preview"    # code default is 2025-08-01-preview
      - key: KNOWLEDGE_TOP_K
        value: "4"
      # Reviewer→Developer feedback cycles (code default is 3). Pinned so prod is
      # explicit and you can tune it in the dashboard without a code change.
      - key: MAX_REVIEW_LOOPS
        value: "3"
      - key: JIRA_SUBTASK_ISSUE_TYPE
        value: "Subtask"               # code default is "Sub-task"
      - key: JIRA_DEFAULT_ASSIGNEE
        value: "me"
      - key: GITHUB_DEFAULT_BRANCH
        value: "main"                # code default is "main"
      - key: GITHUB_PRIVATE
        value: "false"

      # ── Identifiable endpoints / IDs — set in the dashboard (kept OUT of git) ─
      #    `sync: false` = blank placeholder you fill in Render, never committed.
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      # Model picker — dashboard-controlled so you can swap models WITHOUT editing
      # this file or redeploying from git. Set it to your Azure *deployment* name
      # (e.g. gpt-4o-mini, gpt-4.1-nano, gpt-4o). If left blank the app falls back
      # to its built-in default (gpt-4o-mini). Change it in the Render dashboard →
      # Environment, then "Save, rebuild, and deploy" to apply.
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_PROJECT_KEY
        sync: false
      - key: GITHUB_OWNER
        sync: false
      - key: FOUNDRY_SEARCH_ENDPOINT
        sync: false
      - key: FOUNDRY_INDEX
        sync: false
      # The knowledge agent's planner model (e.g. gpt-4o-mini) is bound ONCE at
      # setup time via `scripts/setup_foundry_iq.py agent` (FOUNDRY_AGENT_DEPLOYMENT
      # in your local .env / CI) — NOT here. The running web service only CALLS the
      # already-bound agent, so it needs no deployment name. This is what lets the
      # pipeline use a codex model while Foundry search uses a supported mini model.
      - key: FOUNDRY_KNOWLEDGE_AGENT
        sync: false

      # ── Secrets (API keys / tokens) — set in the dashboard, never in git ──
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: FOUNDRY_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false

